<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Immobilier — Mon Idéal Immobilier</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #108a7e;
            --green-light: #e4f5f3;
            --bg: #e8f5f2;
            --white: #ffffff;
            --text: #1a2332;
            --muted: #8a9bb0;
            --red: #f04040;
            --tag-bg: #d6f0ec;
            --tag-color: #0d7268;
            --radius: 22px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            padding-top: 100px;
        }

        /* ===== TOP NAVBAR ===== */
        .app-navbar {
            background: var(--white);
            padding: 0 28px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 0 #eef0f5;
        }

        .app-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .app-logo-icon {
            width: 40px;
            height: 40px;
            background: var(--green);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .app-logo-text h2 {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }

        .app-logo-text p {
            font-size: 0.68rem;
            color: var(--muted);
            margin-top: 1px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-filters {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: white;
            border: 1.5px solid #e0e5ef;
            border-radius: 30px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.2s;
        }

        .btn-filters:hover {
            border-color: var(--green);
            color: var(--green);
        }

        .fav-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--green);
            border-radius: 30px;
            color: white;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: 'Montserrat', sans-serif;
            transition: background 0.2s;
        }

        .fav-pill:hover {
            background: #0c7268;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            color: var(--muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 20px;
            transition: color 0.2s, background 0.2s;
        }

        .back-link:hover {
            color: var(--green);
            background: var(--green-light);
        }

        /* ===== TAB BAR ===== */
        .tab-bar {
            display: flex;
            background: var(--white);
            border-bottom: 1px solid #eef0f5;
        }

        .tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Montserrat', sans-serif;
            transition: color 0.2s;
            position: relative;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--green);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tab.active {
            color: var(--white);
            background: var(--green);
        }

        .tab.active::after {
            opacity: 0;
        }

        /* ===== PAGE WRAPPER ===== */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* ===== DISCOVER PAGE ===== */
        .discover-page {
            min-height: calc(100vh - 112px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px 20px;
        }

        /* ===== SWIPE CARD ===== */
        .card-wrapper {
            position: relative;
            width: 480px;
        }

        .swipe-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 12px 50px rgba(0, 0, 0, 0.10);
            position: relative;
            transition: transform 0.45s cubic-bezier(.4, .2, .2, 1), opacity 0.3s;
        }

        .swipe-card.gone-left {
            transform: translateX(-120vw) rotate(-22deg) !important;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(.4, .2, .2, 1), opacity 0.3s;
        }

        .swipe-card.gone-right {
            transform: translateX(120vw) rotate(22deg) !important;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(.4, .2, .2, 1), opacity 0.3s;
        }

        /* ===== CARD PHOTO ===== */
        .card-photo {
            position: relative;
            height: 300px;
            overflow: hidden;
            background: #e0e5ef;
        }

        .card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .photo-type-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 20px;
        }

        .photo-price-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: var(--green);
            color: white;
            font-size: 1rem;
            font-weight: 800;
            padding: 7px 18px;
            border-radius: 20px;
        }

        /* stamp */
        .stamp {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 10px;
            border: 4px solid;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
            letter-spacing: 2px;
        }

        .stamp-like {
            left: 14px;
            color: #22c55e;
            border-color: #22c55e;
            transform: translateY(-50%) rotate(-15deg);
        }

        .stamp-nope {
            right: 14px;
            color: #ef4444;
            border-color: #ef4444;
            transform: translateY(-50%) rotate(15deg);
        }

        /* Photo nav arrows */
        .photo-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            transition: background 0.2s;
            z-index: 5;
        }

        .photo-arrow:hover {
            background: white;
        }

        .photo-arrow.left {
            left: 10px;
        }

        .photo-arrow.right {
            right: 10px;
        }

        /* Photo dots */
        .photo-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }

        .photo-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transition: background 0.2s;
        }

        .photo-dot.active {
            background: white;
        }

        /* ===== CARD BODY ===== */
        .card-body {
            padding: 20px 22px;
        }

        .card-address {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 5px;
        }

        .card-city {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 16px;
        }

        .card-city svg {
            color: var(--green);
        }

        /* Stats row */
        .card-stats {
            display: flex;
            gap: 18px;
            margin-bottom: 14px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon-box {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--green-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--green);
        }

        .stat-text label {
            display: block;
            font-size: 0.62rem;
            color: var(--muted);
            font-weight: 600;
        }

        .stat-text span {
            display: block;
            font-size: 0.88rem;
            font-weight: 800;
            color: var(--text);
        }

        /* Meta row */
        .card-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .meta-year {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 600;
        }

        .dpe-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            background: #e8f8ec;
            color: #22c55e;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        /* Tags */
        .card-tags {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }

        .card-tag {
            padding: 5px 12px;
            background: var(--tag-bg);
            color: var(--tag-color);
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* ===== PHOTO PREV ARROW ===== */

        /* ===== ACTION BUTTONS ===== */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-top: 22px;
        }

        .act-btn {
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 3px 14px rgba(0, 0, 0, 0.1);
        }

        .act-btn:hover {
            transform: scale(1.1);
        }

        .act-btn:active {
            transform: scale(0.92);
        }

        .btn-undo {
            width: 50px;
            height: 50px;
            background: white;
            color: #f59e0b;
        }

        .btn-nope {
            width: 60px;
            height: 60px;
            background: white;
            color: var(--red);
        }

        .btn-like {
            width: 60px;
            height: 60px;
            background: var(--green);
            color: white;
            box-shadow: 0 4px 20px rgba(16, 138, 126, 0.35);
        }

        /* Progress pill */
        .progress-pill {
            margin-top: 18px;
            background: rgba(0, 0, 0, 0.07);
            border-radius: 30px;
            padding: 6px 20px;
            font-size: 0.78rem;
            color: #555;
            font-weight: 600;
        }

        /* Deck empty */
        .deck-empty-state {
            text-align: center;
            padding: 50px 30px;
            background: white;
            border-radius: var(--radius);
            box-shadow: 0 12px 50px rgba(0, 0, 0, 0.08);
            width: 480px;
        }

        .deck-empty-state .emoji {
            font-size: 3rem;
            margin-bottom: 14px;
        }

        .deck-empty-state h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .deck-empty-state p {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 22px;
        }

        .btn-restart {
            padding: 13px 28px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 0.88rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 138, 126, 0.3);
        }

        /* ===== LIKES PAGE ===== */
        .likes-page {
            padding: 28px;
            max-width: 900px;
            margin: 0 auto;
        }

        .likes-page-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 20px;
        }

        .likes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        .likes-empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 70px 20px;
            color: var(--muted);
        }

        .likes-empty-state .emoji {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .likes-empty-state p {
            font-size: 0.88rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn-go-discover {
            padding: 13px 28px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 0.88rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-go-discover:hover {
            transform: translateY(-2px);
        }

        /* Liked card in grid */
        .liked-grid-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
        }

        .liked-grid-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.12);
        }

        .liked-grid-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .liked-grid-body {
            padding: 14px 16px;
        }

        .liked-grid-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .liked-grid-city {
            font-size: 0.72rem;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 10px;
        }

        .liked-grid-price {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--green);
        }

        .liked-grid-stats {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .liked-grid-stat {
            font-size: 0.7rem;
            color: var(--muted);
            font-weight: 600;
        }

        .liked-grid-stat strong {
            color: var(--text);
        }

        /* Liked card remove btn */
        .liked-grid-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-top: 1px solid #f4f5f8;
        }

        .btn-unlike {
            font-size: 0.72rem;
            color: var(--red);
            font-weight: 700;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
            transition: opacity 0.2s;
        }

        .btn-unlike:hover {
            opacity: 0.7;
        }

        .btn-details {
            font-size: 0.72rem;
            color: var(--green);
            font-weight: 700;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s;
        }

        .btn-details:hover {
            opacity: 0.7;
        }

        /* ===== DETAIL MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 18, 30, 0.55);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: white;
            border-radius: 24px;
            width: min(640px, 95vw);
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.22);
            transform: scale(0.9) translateY(30px);
            transition: transform 0.35s cubic-bezier(.34, 1.56, .64, 1);
        }

        .modal-overlay.open .modal {
            transform: scale(1) translateY(0);
        }

        .modal::-webkit-scrollbar {
            width: 0;
        }

        .modal-photo {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
            display: block;
        }

        .modal-body {
            padding: 26px 30px 30px;
        }

        .modal-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .modal-address {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text);
        }

        .modal-close {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #f4f5f8;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            flex-shrink: 0;
            margin-left: 12px;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: #e8e9ed;
        }

        .modal-city {
            font-size: 0.8rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 18px;
        }

        .modal-city svg {
            color: var(--green);
        }

        .modal-price {
            font-size: 2.1rem;
            font-weight: 900;
            color: var(--green);
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .modal-stat-box {
            background: #f8f9fb;
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }

        .modal-stat-box .val {
            display: block;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }

        .modal-stat-box .lbl {
            display: block;
            font-size: 0.67rem;
            color: var(--muted);
            font-weight: 600;
            margin-top: 2px;
        }

        .modal-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .modal-tag {
            padding: 6px 14px;
            background: var(--tag-bg);
            color: var(--tag-color);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .modal-desc {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.75;
            margin-bottom: 24px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .btn-modal-cta {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 0.88rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            text-decoration: none !important;
        }

        .btn-modal-cta.primary {
            background: var(--green);
            color: white;
        }

        .btn-modal-cta.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 138, 126, 0.3);
        }

        .btn-modal-cta.secondary {
            background: #f4f5f8;
            color: var(--text);
        }

        .btn-modal-cta.secondary:hover {
            background: #eaebef;
        }

        @media (max-width: 500px) {
            .card-wrapper {
                width: 100%;
                max-width: 360px;
            }

            .deck-empty-state {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- ===== TOP BAR ===== -->
    <!-- Navbar -->
    <header class="navbar navbar-solid" style="position: fixed; top:0; left:0; right:0; z-index: 1000;">
        <div class="logo">
            <a href="index.html" style="display: block; line-height: 0;">
                <img class="logo-img" src="img/Logo_Mon-Ideal-Immobilier_1.svg" alt="Logo Mon Ideal Immobilier">
            </a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="catalogue.html">Acheter</a></li>
                <li><a href="vendre.html">Vendre</a></li>
                <li><a href="location.html">Louer</a></li>
                <li><a href="notre-agence.html">Notre agence</a></li>
                <li><a href="guide.html">Guide</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <!-- Fire / Match Icon (Switch to Favoris) -->
            <button class="fav-pill" style="height: 42px; padding: 0 16px;" onclick="switchTab('favoris')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2c0 0-6 6.2-6 10.5c0 1.8.7 3.4 1.8 4.6c-.3-.7-.5-1.5-.5-2.3c0-3.1 3.5-6.4 4.7-7.5c1.2 1.1 4.7 4.4 4.7 7.5c0 .8-.2 1.6-.5 2.3c1.1-1.2 1.8-2.8 1.8-4.6C18 8.2 12 2 12 2z" />
                </svg>
                <span id="favPillCount">0</span>
            </button>

            <a href="contact.html" class="btn-contact" style="margin-left: 10px;">Nous contacter</a>
        </div>
    </header>

    <!-- ===== TAB BAR ===== -->
    <div class="tab-bar">
        <button class="tab active" id="tabDecouvrir" onclick="switchTab('decouvrir')">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>
            Découvrir
        </button>
        <button class="tab" id="tabFavoris" onclick="switchTab('favoris')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 2c0 0-6 6.2-6 10.5c0 1.8.7 3.4 1.8 4.6c-.3-.7-.5-1.5-.5-2.3c0-3.1 3.5-6.4 4.7-7.5c1.2 1.1 4.7 4.4 4.7 7.5c0 .8-.2 1.6-.5 2.3c1.1-1.2 1.8-2.8 1.8-4.6C18 8.2 12 2 12 2z" />
            </svg>
            Favoris (<span id="favTabCount">0</span>)
        </button>
    </div>

    <!-- ===== PAGE DÉCOUVRIR ===== -->
    <div class="page active" id="pageDecouvrir">
        <div class="discover-page">

            <div class="card-wrapper" id="cardWrapper">
                <!-- Card rendered by JS -->
            </div>

            <div class="action-bar">
                <button class="act-btn btn-undo" id="btnUndo" title="Annuler">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" viewBox="0 0 24 24">
                        <polyline points="1 4 1 10 7 10" />
                        <path d="M3.51 15a9 9 0 1 0 .49-4.95" />
                    </svg>
                </button>
                <button class="act-btn btn-nope" id="btnNope" title="Passer">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
                <button class="act-btn btn-like" id="btnLike" title="J'aime">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2c0 0-6 6.2-6 10.5c0 1.8.7 3.4 1.8 4.6c-.3-.7-.5-1.5-.5-2.3c0-3.1 3.5-6.4 4.7-7.5c1.2 1.1 4.7 4.4 4.7 7.5c0 .8-.2 1.6-.5 2.3c1.1-1.2 1.8-2.8 1.8-4.6C18 8.2 12 2 12 2z" />
                    </svg>
                </button>
            </div>

            <div class="progress-pill" id="progressPill">Propriété 1 / 6</div>
        </div>
    </div>

    <!-- ===== PAGE FAVORIS ===== -->
    <div class="page" id="pageFavoris">
        <div class="likes-page">
            <div class="likes-page-title" id="likePageTitle">❤️ Mes favoris</div>
            <div class="likes-grid" id="likesGrid">
                <div class="likes-empty-state" id="likesEmptyState">
                    <div class="emoji">🔥</div>
                    <p>Aucun favori pour le moment.<br>Swipez à droite sur les biens qui vous plaisent !</p>
                    <button class="btn-go-discover" onclick="switchTab('decouvrir')">Découvrir des biens</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== DETAIL MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <img class="modal-photo" id="modalPhoto" src="" alt="">
            <div class="modal-body">
                <div class="modal-top">
                    <div class="modal-address" id="modalAddress"></div>
                    <button class="modal-close" id="modalClose">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"
                            viewBox="0 0 24 24">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
                <div class="modal-city">
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                    <span id="modalCity"></span>
                </div>
                <div class="modal-city">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                    <span id="modalCity"></span>
                </div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-stats" id="modalStats"></div>
                <div class="modal-tags" id="modalTags"></div>
                <p class="modal-desc" id="modalDesc"></p>
                <div class="modal-actions">
                    <a href="contact.html" class="btn-modal-cta primary" style="text-decoration: none; text-align: center;">Planifier une visite</a>
                </div>
            </div>
        </div>
    </div>

    <script src="biens.js"></script>
    <script>
// Format data from biens.js to match match.html expectations
BIENS.forEach(b => {
    // Standardize fields for Match UI
    if (!b.adresse) b.adresse = b.titre; 
    if (b.pieces && !b.chambres) b.chambres = Math.max(1, b.pieces - 2); 
    
    if (typeof b.prix === 'string' && !b.prix.includes('€')) {
        b.prix = b.prix + " €";
    }
    if (typeof b.surface === 'string' && !b.surface.includes('m²')) {
        b.surface = b.surface + " m²";
    }
    // ensure description is a string if it's an array (which it is in biens.js)
    if (Array.isArray(b.description)) {
        b.desc = b.description.join(' ');
    } else if (b.description) {
        b.desc = b.description;
    }
});

// ===== STATE =====
let currentIndex = 0;
let currentPhotoIndex = 0;
let likes = [];
let history = [];

// drag
let isDragging = false, startX = 0, currentDX = 0;

// ===== HELPERS =====
const $ = id => document.getElementById(id);

function updateFavCount() {
    $('favPillCount').textContent = likes.length;
    $('favTabCount').textContent = likes.length;
}

// ===== TABS =====
function switchTab(tab) {
    const isDiscover = tab === 'decouvrir';
    $('pageDecouvrir').classList.toggle('active', isDiscover);
    $('pageFavoris').classList.toggle('active', !isDiscover);
    $('tabDecouvrir').classList.toggle('active', isDiscover);
    $('tabFavoris').classList.toggle('active', !isDiscover);
    if (!isDiscover) renderLikesGrid();
}

// ===== DISCOVER CARD RENDER =====
function renderCard() {
    const wrapper = $('cardWrapper');
    if (currentIndex >= BIENS.length) {
        wrapper.innerHTML = `
            <div class="deck-empty-state">
                <div class="emoji">🎉</div>
                <h2>Vous avez tout vu !</h2>
                <p>Vous avez aimé <strong>${likes.length}</strong> bien${likes.length !== 1 ? 's' : ''}.</p>
                <button class="btn-restart" onclick="restartDeck()">Recommencer</button>
            </div>
        `;
        $('progressPill').style.display = 'none';
        $('action-bar') && ($('action-bar').style.display = 'none');
        return;
    }

    currentPhotoIndex = 0;
    const b = BIENS[currentIndex];
    const photos = b.photos;

    wrapper.innerHTML = `
        <div class="swipe-card" id="swipeCard">
            <div class="stamp stamp-like">LIKE</div>
            <div class="stamp stamp-nope">NOPE</div>
            <div class="card-photo" id="cardPhotoArea">
                <img src="${photos[0]}" alt="${b.titre}" id="cardPhoto" draggable="false">
                ${photos.length > 1 ? `
                    <button class="photo-arrow left" onclick="changePhoto(-1)">
                        <svg width="12" height="12" fill="none" stroke="#333" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button class="photo-arrow right" onclick="changePhoto(1)">
                        <svg width="12" height="12" fill="none" stroke="#333" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <div class="photo-dots">${photos.map((_, i) => `<div class="photo-dot ${i === 0 ? 'active' : ''}" id="dot${i}"></div>`).join('')}</div>
                ` : ''}
                <span class="photo-type-badge">${b.type}</span>
                <span class="photo-price-badge">${b.prix}</span>
            </div>
            <div class="card-body">
                <div class="card-address">${b.adresse}</div>
                <div class="card-city">
                    <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    ${b.ville}
                </div>
                <div class="card-stats">
                    <div class="stat-item">
                        <div class="stat-icon-box">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>
                        </div>
                        <div class="stat-text"><label>Pièces</label><span>${b.pieces}</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon-box">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
                        </div>
                        <div class="stat-text"><label>Bains</label><span>${b.sdb}</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon-box">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 3H3v7h18V3z"/><path d="M21 14H3v7h18v-7z"/></svg>
                        </div>
                        <div class="stat-text"><label>Surface</label><span>${b.surface}</span></div>
                    </div>
                </div>
                <div class="card-meta">
                    <span class="meta-year">
                        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        ${b.annee}
                    </span>
                    <span class="dpe-badge">
                        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                        DPE ${b.dpe}
                    </span>
                    <a href="#" onclick="openModal(BIENS[currentIndex]); return false;" style="font-size:0.72rem;color:#108a7e;font-weight:700;text-decoration:none;margin-left:auto;display:flex;align-items:center;gap:3px;">
                        Voir détails
                        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </a>
                </div>
                <div class="card-tags">${b.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
            </div>
        </div>
    `;

    $('progressPill').textContent = `Propriété ${currentIndex + 1} / ${BIENS.length}`;
    $('progressPill').style.display = '';

    // Drag
    const card = $('swipeCard');
    card.addEventListener('mousedown', onDragStart);
    card.addEventListener('touchstart', onDragStart, { passive: true });
}

// ===== PHOTO NAV =====
function changePhoto(dir) {
    const b = BIENS[currentIndex];
    if (!b || b.photos.length <= 1) return;
    currentPhotoIndex = (currentPhotoIndex + dir + b.photos.length) % b.photos.length;
    $('cardPhoto').src = b.photos[currentPhotoIndex];
    b.photos.forEach((_, i) => {
        const d = $('dot' + i);
        if (d) d.className = 'photo-dot' + (i === currentPhotoIndex ? ' active' : '');
    });
}

// ===== SWIPE =====
function swipeCard(direction, fromBtn = false) {
    const card = $('swipeCard');
    if (!card) return;
    const b = BIENS[currentIndex];
    card.classList.add(direction === 'right' ? 'gone-right' : 'gone-left');

    if (direction === 'right') {
        if (!likes.find(l => l.id === b.id)) likes.push(b);
        updateFavCount();
    }

    history.push({ index: currentIndex, direction });
    currentIndex++;
    setTimeout(renderCard, 420);
}

// ===== UNDO =====
function undoLast() {
    if (!history.length) return;
    const last = history.pop();
    if (last.direction === 'right') {
        likes = likes.filter(l => l.id !== BIENS[last.index].id);
        updateFavCount();
    }
    currentIndex = last.index;
    renderCard();
}

// ===== RESTART =====
function restartDeck() {
    currentIndex = 0;
    history = [];
    likes = [];
    updateFavCount();
    renderCard();
}

// ===== DRAG / TOUCH =====
function onDragStart(e) {
    isDragging = true;
    startX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
    currentDX = 0;
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchmove', onDragMove, { passive: true });
    document.addEventListener('touchend', onDragEnd);
}

function onDragMove(e) {
    if (!isDragging) return;
    const card = $('swipeCard');
    if (!card) return;
    currentDX = (e.type === 'mousemove' ? e.clientX : e.touches[0].clientX) - startX;
    card.style.transition = 'none';
    card.style.transform = `translateX(${currentDX}px) rotate(${currentDX * 0.06}deg)`;
    const like = card.querySelector('.stamp-like');
    const nope = card.querySelector('.stamp-nope');
    const t = 50;
    like.style.opacity = currentDX > t ? Math.min((currentDX - t) / 70, 1) : 0;
    nope.style.opacity = currentDX < -t ? Math.min((-currentDX - t) / 70, 1) : 0;
}

function onDragEnd() {
    isDragging = false;
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend', onDragEnd);
    const card = $('swipeCard');
    if (!card) return;
    card.style.transition = '';
    if (currentDX > 100) swipeCard('right');
    else if (currentDX < -100) swipeCard('left');
    else {
        card.style.transform = '';
        card.querySelector('.stamp-like').style.opacity = 0;
        card.querySelector('.stamp-nope').style.opacity = 0;
    }
    currentDX = 0;
}

// ===== LIKES GRID =====
function renderLikesGrid() {
    const grid = $('likesGrid');
    const empty = $('likesEmptyState');
    const title = $('likePageTitle');

    title.textContent = `❤️ Mes favoris (${likes.length})`;

    // Remove all liked cards (keep the empty state node)
    Array.from(grid.children).forEach(el => { if (el !== empty) el.remove(); });

    if (likes.length === 0) {
        empty.style.display = '';
        return;
    }
    empty.style.display = 'none';
    likes.forEach(b => {
        const card = document.createElement('div');
        card.className = 'liked-grid-card';
        card.innerHTML = `
            <img class="liked-grid-img" src="${b.photos[0]}" alt="${b.titre}">
            <div class="liked-grid-body">
                <div class="liked-grid-title">${b.titre}</div>
                <div class="liked-grid-city">${b.adresse} · ${b.ville}</div>
                <div class="liked-grid-price">${b.prix}</div>
                <div class="liked-grid-stats">
                    <span class="liked-grid-stat"><strong>${b.pieces}</strong> p.</span>
                    <span class="liked-grid-stat"><strong>${b.sdb}</strong> sdb</span>
                    <span class="liked-grid-stat"><strong>${b.surface}</strong></span>
                </div>
            </div>
            <div class="liked-grid-actions">
                <button class="btn-unlike" onclick="unlikeCard(${b.id}, this)">✕ Retirer</button>
                <button class="btn-details" onclick="openModal(likes.find(l=>l.id===${b.id}))">Voir détails →</button>
            </div>
        `;
        grid.appendChild(card);
    });
}

function unlikeCard(id, btn) {
    likes = likes.filter(l => l.id !== id);
    updateFavCount();
    renderLikesGrid();
}

// ===== MODAL =====
function openModal(b) {
    if (!b) return;
    $('modalPhoto').src = b.photos[0];
    $('modalAddress').textContent = b.adresse;
    $('modalCity').textContent = `${b.ville} (${b.cp})`;
    $('modalPrice').textContent = b.prix;
    $('modalDesc').textContent = b.desc;
    $('modalStats').innerHTML = `
        <div class="modal-stat-box"><span class="val">${b.pieces}</span><span class="lbl">Pièces</span></div>
        <div class="modal-stat-box"><span class="val">${b.sdb}</span><span class="lbl">Salles de bain</span></div>
        <div class="modal-stat-box"><span class="val">${b.surface}</span><span class="lbl">Surface</span></div>
    `;
    $('modalTags').innerHTML = b.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
    $('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    $('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

$('modalClose').addEventListener('click', closeModal);
$('modalOverlay').addEventListener('click', e => { if (e.target === $('modalOverlay')) closeModal(); });

// ===== BUTTONS =====
$('btnNope').addEventListener('click', () => swipeCard('left'));
$('btnLike').addEventListener('click', () => swipeCard('right'));
$('btnUndo').addEventListener('click', undoLast);

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
    if ($('modalOverlay').classList.contains('open')) { if (e.key === 'Escape') closeModal(); return; }
    if (e.key === 'ArrowLeft') swipeCard('left');
    if (e.key === 'ArrowRight') swipeCard('right');
    if (e.key === 'ArrowUp') openModal(BIENS[currentIndex]);
    if (e.key === 'z' || e.key === 'Z') undoLast();
});

// ===== INIT =====
renderCard();
    </script>
</body>

</html>
